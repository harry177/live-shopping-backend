version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "51000-51100:51000-51100/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
