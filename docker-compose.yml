version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    container_name: live-shopping-api
    env_file:
      - .env
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    container_name: live-shopping-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "51000-51100:51000-51100/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
